services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/app/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - ragnet

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celeryconfig.celery_app worker --loglevel=info
    env_file:
      - ./backend/app/.env
    depends_on:
      - redis
      - postgres
    networks:
      - ragnet

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_BASE=http://localhost:8000
  #   networks:
  #     - ragnet

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ragnet

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - ragnet

volumes:
  pgdata:

networks:
  ragnet: