services:
  backend:
    build:
      context: .
    restart: unless-stopped
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - ragnet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - ragnet

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - ragnet

networks:
  ragnet: